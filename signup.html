<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - GANAKA</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #001f3f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: #0a2a4a;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
      width: 100%;
      max-width: 400px;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      font-size: 28px;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      background-color: #ffffff;
      color: #000000;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background-color: #ffffff;
      color: #001f3f;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #f0f0f0;
    }

    .error {
      color: #ff6b6b;
      font-size: 13px;
      display: none;
      margin-bottom: 10px;
    }

    .link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #aaa;
    }

    .link a {
      color: #fff;
      text-decoration: underline;
    }

    .link a:hover {
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="title">Create Account</div>

    <div id="error" class="error">Please fill all fields correctly.</div>

    <form id="signupForm" onsubmit="return registerUser()">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Choose a username">

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Create a password">

      <button type="submit">Sign Up</button>
    </form>

    <div class="link">
      Already have an account? <a href="signin.html">Sign In</a>
    </div>
  </div>

  <script>
    function registerUser() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const error = document.getElementById("error");

      if (!username || !password) {
        error.textContent = "Please fill in both fields.";
        error.style.display = "block";
        return false;
      }

      // Store credentials in localStorage
      localStorage.setItem("ganaka_user", username);
      localStorage.setItem("ganaka_pass", password);

      alert("Account created successfully! You can now sign in.");
      window.location.href = "signin.html";
      return false; // Prevent default form submission
    }
  </script>

</body>
</html>
