<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grade Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f8fc;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .subject {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      font-size: 14px;
      flex: 1;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background-color: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      text-align: center;
      color: #333;
    }

    .error {
      color: red;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Grade Calculator</h1>

    <div id="subjects">
      <div class="subject">
        <input type="text" placeholder="Subject Name (optional)">
        <input type="number" placeholder="Marks Obtained" min="0">
        <input type="number" placeholder="Total Marks" min="1">
      </div>
    </div>

    <div class="buttons">
      <button onclick="addSubject()">Add Subject</button>
      <button onclick="calculateGrade()">Calculate Grade</button>
    </div>

    <div class="error" id="error"></div>
    <div class="result" id="result"></div>
  </div>

  <script>
    function addSubject() {
      const subjectsDiv = document.getElementById('subjects');
      const newSubject = document.createElement('div');
      newSubject.className = 'subject';
      newSubject.innerHTML = `
        <input type="text" placeholder="Subject Name (optional)">
        <input type="number" placeholder="Marks Obtained" min="0">
        <input type="number" placeholder="Total Marks" min="1">
      `;
      subjectsDiv.appendChild(newSubject);
    }

    function calculateGrade() {
      const resultDiv = document.getElementById('result');
      const errorDiv = document.getElementById('error');
      const subjects = document.querySelectorAll('.subject');

      let totalObtained = 0;
      let totalPossible = 0;

      errorDiv.innerHTML = '';
      resultDiv.innerHTML = '';

      for (let subject of subjects) {
        const obtained = parseFloat(subject.children[1].value);
        const total = parseFloat(subject.children[2].value);

        if (isNaN(obtained) || isNaN(total) || obtained < 0 || total <= 0 || obtained > total) {
          errorDiv.textContent = "Please enter valid marks for all subjects.";
          return;
        }

        totalObtained += obtained;
        totalPossible += total;
      }

      if (totalPossible === 0) {
        errorDiv.textContent = "Total marks must be greater than 0.";
        return;
      }

      const percentage = ((totalObtained / totalPossible) * 100).toFixed(2);
      const grade = getGrade(percentage);

      resultDiv.innerHTML = `
        📊 Total Marks: ${totalObtained} / ${totalPossible}<br>
        📈 Percentage: <strong>${percentage}%</strong><br>
        🎓 Grade: <strong>${grade}</strong>
      `;
    }

    function getGrade(percentage) {
      const percent = parseFloat(percentage);
      if (percent >= 90) return 'A+';
      if (percent >= 80) return 'A';
      if (percent >= 70) return 'B';
      if (percent >= 60) return 'C';
      if (percent >= 50) return 'D';
      return 'F';
    }
  </script>

</body>
</html>
