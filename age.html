<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Age Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f6fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    label {
      font-size: 16px;
      margin-bottom: 10px;
      display: block;
      font-weight: bold;
    }

    input[type="date"] {
      padding: 10px;
      font-size: 16px;
      width: 100%;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #007BFF;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      color: #333;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Age Calculator</h1>
    <label for="dob">Select your Date of Birth:</label>
    <input type="date" id="dob" />
    <button onclick="calculateAge()">Calculate Age</button>

    <div class="result" id="result"></div>
    <div class="error" id="error"></div>
  </div>

  <script>
    function calculateAge() {
      const dobInput = document.getElementById('dob');
      const result = document.getElementById('result');
      const error = document.getElementById('error');

      result.innerHTML = '';
      error.innerHTML = '';

      const dobValue = dobInput.value;
      if (!dobValue) {
        error.textContent = 'Please select your date of birth.';
        return;
      }

      const dob = new Date(dobValue);
      const today = new Date();

      if (dob > today) {
        error.textContent = 'Date of birth cannot be in the future.';
        return;
      }

      let years = today.getFullYear() - dob.getFullYear();
      let months = today.getMonth() - dob.getMonth();
      let days = today.getDate() - dob.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
        days += prevMonth.getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      result.innerHTML = `
        You are <strong>${years}</strong> years, <strong>${months}</strong> months, and <strong>${days}</strong> days old.
      `;
    }
  </script>

</body>
</html>
