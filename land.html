<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GANAKA - Welcome</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      background: #001f3f;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }

    .background-icons {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .icon, .symbol {
      position: absolute;
      font-size: clamp(30px, 4vw, 60px);
      opacity: 0.08;
      animation: floatUp 40s linear infinite;
      color: white;
    }

    .symbol {
      font-family: 'Cambria Math', 'Georgia', serif;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
      }
      100% {
        transform: translateY(-80px) rotate(360deg);
      }
    }

    .logo {
      filter: brightness(0) invert(1); /* Make the SVG white */
      width: clamp(80px, 10vw, 120px);
      height: auto;
      margin-bottom: 20px;
      animation: zoomAndSettle 1.8s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
      opacity: 0;
    }

    .title-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .title {
      font-size: clamp(40px, 10vw, 80px);
      font-weight: bold;
      color: white;
      text-decoration: none;
      display: inline-block;
      animation: zoomAndSettle 2s forwards 0.2s, gentleFloat 4s ease-in-out infinite 2.3s;
      opacity: 0;
    }

    .title:hover {
      text-decoration: underline;
    }

    @keyframes zoomAndSettle {
      0% {
        transform: scale(0.5) translateY(30px);
        opacity: 0;
      }
      70% {
        transform: scale(1.08) translateY(-10px);
        opacity: 1;
      }
      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes gentleFloat {
      0% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-12px);
      }
      100% {
        transform: translateY(0);
      }
    }

    .button-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      animation: fadeInButtons 1.5s ease-out forwards 1.5s;
      opacity: 0;
    }

    @keyframes fadeInButtons {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .button-cta {
      padding: 12px 30px;
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 600;
      border-radius: 50px;
      border: 2px solid transparent;
      text-decoration: none;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .button-primary {
      background-color: white;
      color: #001f3f;
      border-color: white;
    }

    .button-primary:hover {
      background-color: #f0f0f0;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 255, 255, 0.3);
    }

    .button-secondary {
      background-color: transparent;
      color: white;
      border-color: white;
    }

    .button-secondary:hover {
      background-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>

  <!-- Background icons -->
  <div class="background-icons">
    <i class="fas fa-calculator icon" style="top: 10%; left: 5%; animation-delay: 0s;"></i>
    <i class="fas fa-plus icon" style="top: 15%; left: 80%; animation-delay: -2s;"></i>
    <i class="fas fa-infinity icon" style="top: 25%; left: 50%; animation-delay: -4s;"></i>
    <i class="fas fa-flask icon" style="top: 35%; left: 10%; animation-delay: -6s;"></i>
    <i class="fas fa-ruler-combined icon" style="top: 45%; left: 90%; animation-delay: -8s;"></i>
    <i class="fas fa-wave-square icon" style="top: 55%; left: 20%; animation-delay: -10s;"></i>
    <i class="fas fa-divide icon" style="top: 65%; left: 60%; animation-delay: -12s;"></i>
    <i class="fas fa-percent icon" style="top: 75%; left: 15%; animation-delay: -14s;"></i>
    <i class="fas fa-equals icon" style="top: 85%; left: 75%; animation-delay: -16s;"></i>
    <i class="fas fa-chart-line icon" style="top: 50%; left: 35%; animation-delay: -18s;"></i>
    <i class="fas fa-atom icon" style="top: 80%; left: 5%; animation-delay: -20s;"></i>
    <i class="fas fa-cogs icon" style="top: 5%; left: 30%; animation-delay: -22s;"></i>

    <div class="symbol" style="top: 5%; left: 10%; animation-delay: -1s;">π</div>
    <div class="symbol" style="top: 30%; left: 40%; animation-delay: -3s;">+</div>
    <div class="symbol" style="top: 15%; left: 75%; animation-delay: -5s;">−</div>
    <div class="symbol" style="top: 50%; left: 85%; animation-delay: -7s;">×</div>
    <div class="symbol" style="top: 60%; left: 20%; animation-delay: -9s;">÷</div>
    <div class="symbol" style="top: 45%; left: 50%; animation-delay: -11s;">=</div>
    <div class="symbol" style="top: 25%; left: 30%; animation-delay: -13s;">∑</div>
    <div class="symbol" style="top: 35%; left: 60%; animation-delay: -15s;">√</div>
    <div class="symbol" style="top: 40%; left: 80%; animation-delay: -17s;">θ</div>
    <div class="symbol" style="top: 20%; left: 90%; animation-delay: -19s;">∫</div>
    <div class="symbol" style="top: 75%; left: 10%; animation-delay: -21s;">sin</div>
    <div class="symbol" style="top: 65%; left: 85%; animation-delay: -23s;">cos</div>
    <div class="symbol" style="top: 80%; left: 30%; animation-delay: -25s;">tan</div>
  </div>

  <!-- Foreground content -->
  <img src="https://thumbs.dreamstime.com/b/calculator-icon-flat-style-calculate-vector-illustration-black-round-background-long-shadow-effect-calculation-circle-187669672.jpg" alt="GANAKA Logo" class="logo" />
  
  <div class="title-container">
    <a href="calci.html" class="title">GANAKA</a>
  </div>

  <div class="button-container">
    <a href="calci.html" class="button-cta button-primary">Get Started</a>
    <a href="signin.html" class="button-cta button-secondary">Sign In</a>
  </div>

</body>
</html>
