<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In - GANAKA</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #001f3f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: #0a2a4a;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
      width: 100%;
      max-width: 400px;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      font-size: 28px;
      margin-bottom: 30px;
      letter-spacing: 2px;
      color: #ffffff;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      background-color: #ffffff;
      color: #000000;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background-color: #ffffff;
      color: #001f3f;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #f0f0f0;
    }

    .error {
      color: #ff6b6b;
      font-size: 13px;
      display: none;
      margin-bottom: 10px;
    }

    .link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #aaa;
    }

    .link a {
      color: #fff;
      text-decoration: underline;
    }

    .link a:hover {
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="title">Sign In</div>

    <div id="error" class="error"></div>

    <form id="signinForm" onsubmit="return validateForm()">
      <label for="username">Username or Email</label>
      <input type="text" id="username" placeholder="Enter your username or email">

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password">

      <button type="submit">Sign In</button>
    </form>

    <div class="link">
      Don’t have an account? <a href="signup.html">Sign Up</a>
    </div>
  </div>

  <script>
    function validateForm() {
      const enteredUser = document.getElementById("username").value.trim();
      const enteredPass = document.getElementById("password").value.trim();
      const error = document.getElementById("error");

      const storedUser = localStorage.getItem("ganaka_user");
      const storedPass = localStorage.getItem("ganaka_pass");

      // Check empty fields
      if (!enteredUser || !enteredPass) {
        error.textContent = "Please enter both username and password.";
        error.style.display = "block";
        return false;
      }

      // Check if username is correct
      if (enteredUser !== storedUser) {
        error.textContent = "Incorrect username or email.";
        error.style.display = "block";
        return false;
      }

      // Check if password is correct
      if (enteredPass !== storedPass) {
        error.textContent = "Incorrect password.";
        error.style.display = "block";
        return false;
      }

      // All correct
      error.style.display = "none";
      alert("Sign in successful!");
      window.location.href = "calci.html"; // Redirect to calculator
      return false;
    }
  </script>

</body>
</html>
