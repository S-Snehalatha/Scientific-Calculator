<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GANAKA - Welcome</title>

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <!-- Orbitron Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      background: #001f3f;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }

    .background-icons {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .icon, .symbol {
      position: absolute;
      font-size: clamp(30px, 4vw, 60px);
      opacity: 0.08;
      animation: floatUp 40s linear infinite;
      color: white;
    }

    .symbol {
      font-family: 'Cambria Math', 'Georgia', serif;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
      }
      100% {
        transform: translateY(-80px) rotate(360deg);
      }
    }

    .logo {
      width: clamp(90px, 11vw, 120px);
      height: auto;
      margin-bottom: 20px;
      animation: zoomAndSettle 1.8s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
      opacity: 0;
    }

    .title-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(40px, 10vw, 80px);
      font-weight: 700;
      color: white;
      text-decoration: none !important;
      display: inline-block;
      animation: zoomAndSettle 2s forwards 0.2s, gentleFloat 4s ease-in-out infinite 2.3s;
      opacity: 0;
      cursor: pointer;
    }

    .title:hover {
      text-decoration: none !important;
    }

    @keyframes zoomAndSettle {
      0% {
        transform: scale(0.5) translateY(30px);
        opacity: 0;
      }
      70% {
        transform: scale(1.08) translateY(-10px);
        opacity: 1;
      }
      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes gentleFloat {
      0% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-12px);
      }
      100% {
        transform: translateY(0);
      }
    }

    .button-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      animation: fadeInButtons 1.5s ease-out forwards 1.5s;
      opacity: 0;
    }

    @keyframes fadeInButtons {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .button-cta {
      padding: 12px 30px;
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 600;
      border-radius: 50px;
      border: 2px solid transparent;
      text-decoration: none;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .button-primary {
      background-color: white;
      color: #001f3f;
      border-color: white;
    }

    .button-primary:hover {
      background-color: #f0f0f0;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 255, 255, 0.3);
    }

    .button-secondary {
      background-color: transparent;
      color: white;
      border-color: white;
    }

    .button-secondary:hover {
      background-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>

  <!-- Background Icons -->
  <div class="background-icons">
    <i class="fas fa-calculator icon" style="top: 10%; left: 5%; animation-delay: 0s;"></i>
    <i class="fas fa-plus icon" style="top: 15%; left: 80%; animation-delay: -2s;"></i>
    <div class="symbol" style="top: 35%; left: 60%; animation-delay: -5s;">∑</div>
    <div class="symbol" style="top: 65%; left: 85%; animation-delay: -8s;">√</div>
    <div class="symbol" style="top: 45%; left: 30%; animation-delay: -10s;">π</div>
  </div>

  <!-- Foreground Logo -->
  <img src="https://cdn-icons-png.flaticon.com/512/992/992703.png" alt="Calculator Icon" class="logo" />

  <!-- Title -->
  <div class="title-container">
    <a href="cal.html" class="title">GANAKA</a>
  </div>

  <!-- Buttons -->
  <div class="button-container">
    <a href="Cal.html" class="button-cta button-primary">Get Started</a>
    <a href="signin.html" class="button-cta button-secondary">Sign In</a>
  </div>

</body>
</html>
