<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css"> <!-- Your CSS file -->
</head>
<body>
    <h1>Contact Us</h1>
    <!--
        IMPORTANT:
        1. Replace your@email.com with sangamsnehalatha@gmail.com
        2. The first submission will send an activation email TO sangamsnehalatha@gmail.com.
           You MUST click the link in that email to activate the form.
    -->
    <form id="contactForm" action="https://formsubmit.co/sangamsnehalatha@gmail.com" method="POST">
        <!-- (Optional) For a custom "Thank You" page on your site -->
        <input type="hidden" name="_next" value="https://yourdomain.com/thankyou.html">
        <!-- (Optional) For a custom email subject -->
        <input type="hidden" name="_subject" value="New Contact Form Submission!">
        <!-- (Optional) To disable Captcha (not recommended for public sites) -->
        <!-- <input type="hidden" name="_captcha" value="false"> -->

        <div>
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div>
            <label for="email">Your Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div>
            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" required> <!-- You can also use the hidden _subject input above -->
        </div>
        <div>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit">Send Message</button>
    </form>
    <p id="form-status"></p>

    <script src="script.js"></script> <!-- Your JavaScript file -->
</body>
</html>
