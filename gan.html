<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GANAKA - Welcome</title>

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <!-- Exo 2 Font -->
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      background: #001f3f;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }

    .background-icons {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .icon, .symbol {
      position: absolute;
      font-size: clamp(30px, 4vw, 60px);
      opacity: 0.08;
      animation: floatUp 40s linear infinite;
      color: white;
    }

    .symbol {
      font-family: 'Cambria Math', 'Georgia', serif;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
      }
      100% {
        transform: translateY(-80px) rotate(360deg);
      }
    }

    .logo-container { /* Changed from .logo to a container for the SVG */
      width: clamp(90px, 11vw, 130px); /* Slightly adjusted max size for better SVG rendering */
      margin-bottom: 20px;
      animation: zoomAndSettle 1.8s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
      opacity: 0;
      line-height: 0; /* Helps remove extra space around SVG */
    }

    .calculator-logo-svg {
      width: 100%;
      height: auto; /* Maintain aspect ratio defined by viewBox */
      display: block; /* Remove extra space */
    }


    .title-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .title {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(40px, 10vw, 80px);
      font-weight: 700;
      color: white;
      text-decoration: none !important;
      display: inline-block;
      animation: zoomAndSettle 2s forwards 0.2s, gentleFloat 4s ease-in-out infinite 2.3s;
      opacity: 0;
      cursor: pointer;
    }

    .title:hover {
      text-decoration: none !important;
    }

    @keyframes zoomAndSettle {
      0% {
        transform: scale(0.5) translateY(30px);
        opacity: 0;
      }
      70% {
        transform: scale(1.08) translateY(-10px);
        opacity: 1;
      }
      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes gentleFloat {
      0% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-12px);
      }
      100% {
        transform: translateY(0);
      }
    }

    .button-container {
      display: flex;
      justify-content: center;
      animation: fadeInButtons 1.5s ease-out forwards 1.5s;
      opacity: 0;
    }

    @keyframes fadeInButtons {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .button-cta {
      padding: 12px 30px;
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 600;
      border-radius: 50px;
      border: 2px solid transparent;
      text-decoration: none;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .button-primary {
      background-color: white;
      color: #001f3f;
      border-color: white;
    }

    .button-primary:hover {
      background-color: #f0f0f0;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>

  <!-- Background Icons -->
  <div class="background-icons">
    <i class="fas fa-calculator icon" style="top: 10%; left: 5%; animation-delay: 0s;"></i>
    <i class="fas fa-plus icon" style="top: 15%; left: 80%; animation-delay: -2s;"></i>
    <div class="symbol" style="top: 35%; left: 60%; animation-delay: -5s;">∑</div>
    <div class="symbol" style="top: 65%; left: 85%; animation-delay: -8s;">√</div>
    <div class="symbol" style="top: 45%; left: 30%; animation-delay: -10s;">π</div>
    <i class="fas fa-infinity icon" style="top: 75%; left: 10%; animation-delay: -3s;"></i>
    <div class="symbol" style="top: 20%; left: 40%; animation-delay: -7s;">∫</div>
  </div>

  <!-- Embedded SVG Logo -->
  <div class="logo-container">
    <svg class="calculator-logo-svg" viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="buttonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" /> {/* Lighter button top */}
          <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" /> {/* Darker button bottom */}
        </linearGradient>
        <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#e0f0ff; stop-opacity:1" /> {/* Lighter screen top */}
          <stop offset="100%" style="stop-color:#c0d8f0; stop-opacity:1" /> {/* Darker screen bottom */}
        </linearGradient>
        <linearGradient id="accent1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ff9a8b;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ff6a88;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="accent2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#89f7fe;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#66a6ff;stop-opacity:1" />
        </linearGradient>
      </defs>
      <!-- Main Body -->
      <rect x="5" y="5" width="70" height="90" rx="8" ry="8" fill="white" stroke="#d0d0d0" stroke-width="0.75"/>
      <!-- Screen -->
      <rect x="12" y="12" width="56" height="22" rx="3" ry="3" fill="url(#screenGrad)" stroke="#b0b0b0" stroke-width="0.5"/>
      <text x="40" y="26.5" font-family="'Exo 2', sans-serif" font-size="8" fill="#001f3f" font-weight="600" text-anchor="middle">GANAKA</text>

      <!-- Buttons Grid -->
      <g stroke="#b0b0b0" stroke-width="0.3">
        <rect x="15" y="40" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
        <rect x="28" y="40" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
        <rect x="41" y="40" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
        <rect x="54" y="40" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />

        <rect x="15" y="51" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
        <rect x="28" y="51" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
        <rect x="41" y="51" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
        <rect x="54" y="51" width="10" height="8" rx="1.5" fill="url(#accent1Grad)" /> <!-- Accent button 1 -->

        <rect x="15" y="62" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
        <rect x="28" y="62" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
        <rect x="41" y="62" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
        <rect x="54" y="62" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />

        <rect x="15" y="73" width="23" height="8" rx="1.5" fill="url(#buttonGrad)" /> <!-- Wider button -->
        <rect x="41" y="73" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
        <rect x="54" y="73" width="10" height="8" rx="1.5" fill="url(#accent2Grad)" /> <!-- Accent button 2 -->

        <rect x="15" y="84" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
        <rect x="28" y="84" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
        <rect x="41" y="84" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
        <rect x="54" y="84" width="10" height="8" rx="1.5" fill="url(#buttonGrad)" />
      </g>
      <!-- Small text/symbols on buttons (example) -->
      <text x="17" y="45.5" font-family="Arial, sans-serif" font-size="3.5" fill="#333" font-weight="bold">sin</text>
      <text x="30" y="45.5" font-family="Arial, sans-serif" font-size="3.5" fill="#333" font-weight="bold">cos</text>
      <text x="43" y="45.5" font-family="Arial, sans-serif" font-size="3.5" fill="#333" font-weight="bold">log</text>
      <text x="56" y="45.5" font-family="Arial, sans-serif" font-size="3.5" fill="#333" font-weight="bold">√</text>
    </svg>
  </div>


  <!-- Title -->
  <div class="title-container">
    <a href="Cal.html" class="title">GANAKA</a>
  </div>

  <!-- Buttons -->
  <div class="button-container">
    <a href="Cal.html" class="button-cta button-primary">Get Started</a>
  </div>

</body>
</html>
